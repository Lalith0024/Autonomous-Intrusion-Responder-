name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest httpx fastapi uvicorn pydantic pydantic-settings python-dotenv langchain langchain-core langchain-openai langgraph streamlit langchain-groq
    - name: Lint with Ruff
      run: |
        ruff check . || true
    - name: Run basic unit tests
      run: |
        pytest tests/test_schemas.py
