version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: .
    command: python run.py
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      MEMORY_ENABLED: "true"
      TOOLS_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  worker:
    build: .
    command: python -m src.queue.worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      MEMORY_ENABLED: "true"
      TOOLS_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    command: streamlit run src/streamlit_app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      API_BASE: http://api:8000
    depends_on:
      - api

volumes:
  redis_data:
